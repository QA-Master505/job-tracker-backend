name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Syntax check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Placeholder until a pytest suite is added in a future phase.
      # Compiles every .py file to catch syntax errors and bad imports.
      - name: Syntax check
        run: |
          find . -name "*.py" -not -path "./.venv/*" | \
            xargs python -m py_compile && \
            echo "All files OK"
